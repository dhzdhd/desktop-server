api:
  insecure: false
  dashboard: true

entryPoints:
  web:
    address: :80
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  websecure:
    address: :443
    http:
      tls:
        certResolver: le

providers:
  file:
    directory: /etc/traefik/middleware
    watch: true

certificatesResolvers:
  le:
    acme:
      storage: /letsencrypt/acme.json
      dnsChallenge:
        provider: cloudflare

metrics:
  prometheus:
    addEntryPointsLabels: true
    addServicesLabels: true

log:
  level: INFO
  format: common

accessLog:
  format: common

experimental:
  plugins:
    sablier:
      moduleName: "github.com/sablierapp/sablier-traefik-plugin"
      version: "v1.3.0"
