api:
  insecure: false
  dashboard: true

entryPoints:
  web:
    address: :80
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  websecure:
    address: :443
    http:
      tls:
        certResolver: le

providers:
  docker:
    exposedByDefault: true
    network: proxy
    defaultRule: 'Host(`{{ .Name }}.{{ env "DOMAIN" }}`)'

  file:
    directory: /etc/traefik/middleware
    watch: true

certificatesResolvers:
  le:
    acme:
      email: '{{ env "EMAIL" }}'
      storage: /letsencrypt/acme.json
      dnsChallenge:
        provider: cloudflare

metrics:
  prometheus:
    addEntryPointsLabels: true
    addServicesLabels: true

log:
  level: INFO
  format: common

accessLog:
  format: common

experimental:
  plugins:
    sablier:
      moduleName: "github.com/sablierapp/sablier-traefik-plugin"
      version: "v1.3.0"
