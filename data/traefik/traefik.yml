api:
  insecure: false
  dashboard: true

entryPoints:
  web:
    address: :80
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  websecure:
    address: :443
    http:
      tls:
        certResolver: le

tls:
  options:
    modern:
      minVersion: "VersionTLS13"
    intermediate:
      minVersion: "VersionTLS12"
      cipherSuites:
        - "TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256"
        - "TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256"
        - "TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384"
        - "TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384"
        - "TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305"
        - "TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305"

http:
  middlewares:
    authelia:
      forwardAuth:
        address: "http://authelia:9091/api/authz/forward-auth"
        trustForwardHeader: true
        maxResponseBodySize: 8192
        authResponseHeaders:
          - "Remote-User"
          - "Remote-Groups"
          - "Remote-Email"
          - "Remote-Name"
    authelia-basic:
      forwardAuth:
        address: "http://authelia:9091/api/verify?auth=basic"
        trustForwardHeader: true
        maxResponseBodySize: 8192
        authResponseHeaders:
          - "Remote-User"
          - "Remote-Groups"
          - "Remote-Email"
          - "Remote-Name"

routers:
  traefik:
    rule: "Host(`traefik.dhzdhd.dev`)"
    entryPoints: "websecure"
    service: "api@internal"
    middlewares:
      - "authelia@file"
    tls:
      options: "modern@file"
      certResolver: "le"

services:
  authelia:
    loadBalancer:
      servers:
        - url: "http://authelia:9091"

providers:
  docker:
    exposedByDefault: true
    network: proxy
    defaultRule: 'Host(`{{ index .Labels "com.docker.compose.service" }}.dhzdhd.dev`)'
  file:
    directory: /etc/traefik/middleware
    watch: true

certificatesResolvers:
  le:
    acme:
      email: "your@email.com"
      storage: /letsencrypt/acme.json
      dnsChallenge:
        provider: cloudflare

metrics:
  prometheus:
    addEntryPointsLabels: true
    addServicesLabels: true

log:
  level: INFO
  format: common

accessLog:
  format: common

experimental:
  plugins:
    sablier:
      moduleName: "github.com/sablierapp/sablier-traefik-plugin"
      version: "v1.3.0"
