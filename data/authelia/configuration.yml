# yamllint disable rule:comments-indentation
---
theme: "dark"

# https://www.authelia.com/configuration/miscellaneous/introduction/
default_2fa_method: "totp"

# https://www.authelia.com/configuration/first-factor/introduction/
authentication_backend:
  refresh_interval: "10m"
  password_reset:
    disable: false
  file:
    path: "/config/users.yml"
    search:
      email: true
      case_insensitive: true

# https://www.authelia.com/configuration/second-factor/duo/
duo_api:
  disable: true

# https://www.authelia.com/configuration/miscellaneous/server/
server:
  address: "tcp://:9091/authelia"
  endpoints:
    authz:
      forward-auth:
        implementation: "ForwardAuth"

# https://www.authelia.com/configuration/security/access-control/
access_control:
  default_policy: "deny"
  rules:
    - domain:
        - "fs.dhzdhd.dev"
        - "prometheus.dhzdhd.dev"
        - "alloy.dhzdhd.dev"
        - "loki.dhzdhd.dev"
      subject: "group:admins"
      policy: "two_factor"
    - domain:
        - "media.dhzdhd.dev"
        - "home.dhzdhd.dev"
        - "doc.dhzdhd.dev"
        - "link.dhzdhd.dev"
        - "grafana.dhzdhd.dev"
        - "vault.dhzdhd.dev"
      subject: ["group:admins", "group:users"]
      policy: "two_factor"

# https://www.authelia.com/configuration/security/regulation/
regulation:
  max_retries: 7
  find_time: "2m"
  ban_time: "5m"

# https://www.authelia.com/configuration/security/password-policy/
password_policy:
  standard:
    enabled: false
    min_length: 10
    require_uppercase: true
    require_lowercase: true
    require_number: true
    require_special: true
  zxcvbn:
    enabled: true
    min_score: 3

# https://www.authelia.com/configuration/identity-validation/reset-password/
identity_validation:
  reset_password:
    jwt_secret: '{{ env "AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET" }}'

# https://www.authelia.com/configuration/session/introduction/
session:
  secret: '{{ env "AUTHELIA_SESSION_SECRET" }}'
  cookies:
    - domain: "dhzdhd.dev"
      authelia_url: "https://auth.dhzdhd.dev"
  redis:
    host: redis
    port: 6379

# https://www.authelia.com/configuration/storage/introduction/
storage:
  encryption_key: '{{ env "AUTHELIA_STORAGE_ENCRYPTION_KEY" }}'
  postgres:
    address: "tcp://db_postgres:5432"
    database: "authelia"
    username: '{{ env "AUTHELIA_STORAGE_POSTGRES_USERNAME" }}'
    password: '{{ env "AUTHELIA_STORAGE_POSTGRES_PASSWORD" }}'

# https://www.authelia.com/configuration/notifications/introduction/
notifier:
  smtp:
    address: "submission://smtp.gmail.com:587"
    username: '{{ env "AUTHELIA_NOTIFIER_SMTP_USERNAME" }}'
    password: '{{ env "AUTHELIA_NOTIFIER_SMTP_PASSWORD" }}'
    sender: "authelia@dhzdhd.dev"

# https://www.authelia.com/configuration/telemetry/metrics/
telemetry:
  metrics:
    enabled: false

# https://www.authelia.com/configuration/identity-providers/introduction/
identity_providers:
  oidc:
    hmac_secret: '{{ env "AUTHELIA_IDENTITY_PROVIDERS_OIDC_HMAC_SECRET" }}'
    jwks:
      - key: |
          {{ secret "/config/secrets/oidc/jwks/private.pem" | mindent 10 "|" | msquote }}
    enable_client_debug_messages: true
    enforce_pkce: "public_clients_only"
    require_pushed_authorization_requests: false
    # authorization_policies:  NOTE: Might require it for fine grained access someday
    cors:
      endpoints:
        - "authorization"
        - "token"
        - "revocation"
        - "introspection"
      allowed_origins_from_client_redirect_uris: true
    claims_policies:
      grafana:
        id_token: ["email", "name", "groups", "preferred_username"]
    clients:
      - client_id: '{{ env "GF_AUTH_GENERIC_OAUTH_CLIENT_ID" }}'
        claims_policy: grafana
        client_name: Grafana
        client_secret: '{{ env "GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET" }}'
        public: false
        redirect_uris:
          - "https://grafana.dhzdhd.dev/login/generic_oauth"
        scopes:
          - "openid"
          - "groups"
          - "email"
          - "profile"
        grant_types:
          - "authorization_code"
        authorization_policy: "two_factor"
        requested_audience_mode: "explicit"
        consent_mode: "explicit"
        access_token_signed_response_alg: "none"
        userinfo_signed_response_alg: "none"
        token_endpoint_auth_method: "client_secret_basic"
        response_types:
          - "code"
        require_pkce: true
        pkce_challenge_method: "S256"

      - client_id: '{{ env "VAULTWARDEN_SSO_CLIENT_ID" }}'
        client_name: Vaultwarden
        client_secret: '{{ env "VAULTWARDEN_SSO_CLIENT_SECRET" }}'
        public: false
        require_pkce: true
        pkce_challenge_method: "S256"
        authorization_policy: "two_factor"
        consent_mode: "implicit"
        redirect_uris:
          - "https://vault.dhzdhd.dev/identity/connect/oidc-signin"
        scopes:
          - "openid"
          - "profile"
          - "email"
          - "offline_access"
        grant_types:
          - "authorization_code"
          - "refresh_token"
        response_types:
          - "code"
        token_endpoint_auth_method: "client_secret_basic"
        access_token_signed_response_alg: "none"
        userinfo_signed_response_alg: "none"

      - client_id: '{{ env "AUTH_OIDC_CLIENT_ID" }}'
        client_name: Papra
        client_secret: '{{ env "AUTH_OIDC_CLIENT_SECRET" }}'
        public: false
        require_pkce: false
        authorization_policy: "two_factor"
        consent_mode: "implicit"
        redirect_uris:
          - "https://doc.dhzdhd.dev/api/auth/callback/oidc"
        scopes:
          - "openid"
          - "profile"
          - "email"
        grant_types:
          - "authorization_code"
        response_types:
          - "code"
        token_endpoint_auth_method: "client_secret_basic"

# https://www.authelia.com/configuration/miscellaneous/logging/
log:
  level: "debug"
  format: "json"
  file_path: "/config/authelia.log"
  keep_stdout: false
